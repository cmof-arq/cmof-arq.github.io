<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cesar Ortiz | CMOF Architecture Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Conthrax';
    src: url('CONTHRAX-SEMIBOLD.OTF') format('opentype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Square721BT';
    src: url('SQUARE721_BT_BOLD.TTF') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Square721BT';
    src: url('SQUARE721_BT_ROMAN.TTF') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg:      #111110;
    --surface: #1a1a18;
    --orange:  #ff6600;
    --muted:   #888880;
    --border:  #2a2a28;
    --text:    #e8e6e0;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  .page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOP ── */
  .top {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 1rem;
    position: relative;
    overflow: hidden;
  }

  .top::before {
    content: '';
    position: absolute;
    left: 0; top: 15%; bottom: 15%;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--orange), transparent);
    opacity: 0.5;
  }

  /* ── LOGO ── */
  .logo-wrap {
    margin-bottom: 1.6rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .logo-wrap img {
    height: 320px;
    width: auto;
    object-fit: contain;
    display: block;
  }

  /* ── NOMBRE ── */
  .name {
    font-family: 'Square721BT', 'Barlow', sans-serif;
    font-weight: 400;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8cd7f7;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }

  .role {
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8cd7f7;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.8s 0.55s forwards;
  }

  /* ── SEPARADOR ── */
  .sep {
    width: 48px;
    height: 1px;
    background: var(--orange);
    margin: 1.4rem auto;
    opacity: 0;
    animation: fadeUp 0.8s 0.65s forwards;
  }

  /* ── LINKS ── */
  .links {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.6rem 1.1rem;
    border-radius: 2px;
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .btn:hover {
    border-color: var(--orange);
    color: var(--orange);
    transform: translateY(-2px);
  }
  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ── FILMSTRIP ── */
  .filmstrip-wrap {
    flex: 0 0 33vh;
    overflow: hidden;
    position: relative;
    border-top: 1px solid var(--border);
    background: #0d0d0c;
  }

  .filmstrip-wrap::before,
  .filmstrip-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    z-index: 2;
    pointer-events: none;
  }
  .filmstrip-wrap::before {
    left: 0;
    background: linear-gradient(to right, #0d0d0c, transparent);
  }
  .filmstrip-wrap::after {
    right: 0;
    background: linear-gradient(to left, #0d0d0c, transparent);
  }

  .filmstrip {
    display: flex;
    height: 100%;
    width: max-content;
    will-change: transform;
  }

  .filmstrip img {
    height: 100%;
    width: auto;
    object-fit: cover;
    flex-shrink: 0;
    margin-right: 3px;
    opacity: 0.75;
    transition: opacity 0.3s;
    display: block;
  }
  .filmstrip img:hover { opacity: 1; }

  /* ── ANIMACIONES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }


  /* ── RESPONSIVO ── */

  /* Tablet (481px - 768px) */
  @media (max-width: 768px) and (min-width: 481px) {
    .logo-wrap img { height: 200px; }
    .name { font-size: clamp(1.3rem, 3.5vw, 1.9rem); }
    .role { font-size: 0.7rem; }
    .links { gap: 0.6rem; }
    .btn { font-size: 0.75rem; padding: 0.55rem 1rem; }
    .filmstrip-wrap { flex: 0 0 30vh; }
  }

  /* Móvil (hasta 480px) */
  @media (max-width: 480px) {
    html, body { overflow: hidden; }

    .page {
      height: 100dvh; /* dynamic viewport height: descuenta la barra del navegador */
    }

    .top {
      padding: 0.9rem 1.2rem 0.5rem;
      justify-content: center;
      gap: 0;
    }

    .top::before { display: none; }

    .logo-wrap {
      margin-bottom: 0.7rem;
    }
    .logo-wrap img {
      height: 120px;
    }

    .name {
      font-size: clamp(1rem, 5.2vw, 1.25rem);
      letter-spacing: 0.07em;
    }

    .role {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      margin-top: 0.3rem;
    }

    .sep { margin: 0.75rem auto; }

    /* Botones: grilla de 2 columnas */
    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      font-size: 0.7rem;
      padding: 0.6rem 0.7rem;
      justify-content: center;
      border-radius: 3px;
    }

    .filmstrip-wrap {
      flex: 0 0 22vh;
      min-height: 120px;
    }
  }
</style>

<script>
(function(){
  var wrap  = document.querySelector('.filmstrip-wrap');
  var strip = document.querySelector('.filmstrip');

  // Posición acumulada en px
  var pos        = 0;
  // Velocidad base: px por frame (positivo = izquierda)
  var BASE_SPEED = 0.6;
  var speed      = BASE_SPEED;   // velocidad actual (puede ser negativa)
  var mouseX     = -1;           // -1 = mouse fuera del zócalo
  var halfWidth  = 0;
  var raf;

  // Ancho total de una mitad del strip (para loop)
  function getHalfWidth() {
    return strip.scrollWidth / 2;
  }

  wrap.addEventListener('mouseenter', function(e){
    halfWidth = getHalfWidth();
    mouseX = e.clientX;
  });
  wrap.addEventListener('mousemove', function(e){
    mouseX = e.clientX;
  });
  wrap.addEventListener('mouseleave', function(){
    mouseX = -1;
  });

  function tick() {
    var half = getHalfWidth();

    if (mouseX < 0) {
      // Mouse fuera: velocidad base hacia la izquierda
      speed = BASE_SPEED;
    } else {
      var rect   = wrap.getBoundingClientRect();
      var relX   = mouseX - rect.left;          // 0 … rect.width
      var center = rect.width / 2;
      var dist   = relX - center;               // negativo=izq, positivo=der
      // Normalizar: -1 (extremo izq) … 0 (centro) … +1 (extremo der)
      var norm   = dist / center;
      // Velocidad: centro = 0, bordes = ±BASE_SPEED * 2.5
      speed = norm * BASE_SPEED * 2.5;
    }

    pos -= speed;  // restar porque translateX negativo mueve a la izquierda

    // Loop seamless: cuando llega al -half, vuelve a 0
    if (pos <= -half) pos += half;
    if (pos > 0)      pos -= half;

    strip.style.transform = 'translateX(' + pos + 'px)';
    raf = requestAnimationFrame(tick);
  }

  raf = requestAnimationFrame(tick);

  // ── CONTROL TÁCTIL (móvil) ──
  var touchStartX = 0;
  var touchCurrentX = 0;
  var isTouching = false;

  wrap.addEventListener('touchstart', function(e){
    touchStartX   = e.touches[0].clientX;
    touchCurrentX = touchStartX;
    isTouching    = true;
  }, {passive: true});

  wrap.addEventListener('touchmove', function(e){
    touchCurrentX = e.touches[0].clientX;
    var rect   = wrap.getBoundingClientRect();
    var relX   = touchCurrentX - rect.left;
    var center = rect.width / 2;
    var dist   = relX - center;
    var norm   = dist / center;
    speed = norm * BASE_SPEED * 2.5;
  }, {passive: true});

  wrap.addEventListener('touchend', function(){
    isTouching = false;
    speed = BASE_SPEED;
  }, {passive: true});

})();
</script>
