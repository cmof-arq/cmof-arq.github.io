<style>
@font-face {
  font-family: 'Conthrax';
  src: url('assets/fonts/CONTHRAX-SEMIBOLD.OTF') format('opentype');
  font-weight: 600; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_BOLD.TTF') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_ROMAN.TTF') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}

:root {
  --bg:      #111110;
  --surface: #1a1a18;
  --orange:  #ff6600;
  --blue:    #8cd7f7;
  --muted:   #888880;
  --border:  #2a2a28;
  --text:    #e8e6e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Square721BT', sans-serif;
  overflow: hidden;
}

/* ═══════════════════════════════
   PAGE — 4 bandas
═══════════════════════════════ */
.page {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ─── BANDA 1: HEADER (7/32) ─── */
.header {
  flex: 0 0 calc(100vh * 7/32);
  display: flex;
  align-items: stretch;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 0;
}

/* Zona logo */
.header-logo {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  border-right: 1px solid var(--border);
}
.header-logo img {
  height: calc(100vh * 7/32 * 0.72);
  width: auto;
  object-fit: contain;
  display: block;
}

/* Zona identidad + nav */
.header-identity {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 2rem 1.1rem 1.8rem;
  gap: 0.2rem;
}

.h-name {
  font-family: 'Conthrax', sans-serif;
  font-size: clamp(0.85rem, 1.6vw, 1.25rem);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

.h-role {
  font-family: 'Square721BT', sans-serif;
  font-size: clamp(0.6rem, 0.9vw, 0.75rem);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Nav links en la misma línea */
.header-nav {
  position: absolute;
  right: 2rem;
  bottom: 1.1rem;
  display: flex;
  align-items: center;
  gap: 2rem;
}

.nav-link {
  font-family: 'Square721BT', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
  white-space: nowrap;
}
.nav-link:hover { color: var(--orange); }
.nav-link.active { color: var(--orange); }

/* Selector de idioma */
.lang-switch {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-left: 0.6rem;
  padding-left: 1.2rem;
  border-left: 1px solid var(--border2, #333330);
}
.lang-btn {
  font-family: 'Square721BT', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { color: var(--orange); }
.lang-sep { color: var(--border2, #333330); font-size: 0.6rem; }

/* Línea naranja en la parte inferior del header */
.header::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--orange) 20%, var(--orange) 80%, transparent);
  opacity: 0.4;
}

/* ─── BANDAS 2, 3, 4: CINTAS (1/4 cada una) ─── */
.filmstrip-wrap {
  flex: 0 0 calc(100vh * 1/4);
  overflow: hidden;
  position: relative;
  border-top: 1px solid var(--border);
  background: #0a0a09;
  cursor: crosshair;
}

/* Overlay degradado color/BW via CSS mask + canvas */
.filmstrip-wrap .bw-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 2;
  pointer-events: none;
}

.filmstrip {
  display: flex;
  height: 100%;
  width: max-content;
  will-change: transform;
}

.filmstrip img {
  height: 100%;
  width: auto;
  object-fit: cover;
  flex-shrink: 0;
  margin-right: 3px;
  display: block;
}

/* ─── FAJA FOOTER (1/32) ─── */
.footer-bar {
  flex: 0 0 calc(100vh * 1/32);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.footer-bar span {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

.footer-social {
  display: flex;
  align-items: center;
  gap: 12px; /* igual al tamaño del ícono (12px) */
  height: 100%;
}
.footer-social a {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-social a:hover { color: var(--orange); }
.footer-social svg { width: 12px; height: 12px; }

/* ─── ANIMACIÓN ENTRADA ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.header { animation: fadeUp 0.7s 0.1s both; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .header-nav { display: none; }
  .h-name { font-size: 0.8rem; }
  .header-identity { padding: 0 1rem 0.8rem 1rem; }
}
@media (max-width: 480px) {
  html, body { overflow: hidden; }
  .page { height: 100dvh; }
  .header { flex: 0 0 calc(100dvh * 7/32); }
  .filmstrip-wrap { flex: 0 0 calc(100dvh * 1/4); }
  .footer-bar { flex: 0 0 calc(100dvh * 1/32); }
  .header-logo img { height: calc(100dvh * 7/32 * 0.65); }
  .h-name { font-size: 0.72rem; }
}
</style>

<script>
/* ══════════════════════════════════════════════════
   FILMSTRIP ENGINE
   Cada cinta es independiente en velocidad y dirección
   Efecto: centro=color, laterales=BN, transición degradada
══════════════════════════════════════════════════ */

(function() {

  var BASE_SPEED = 0.55;

  // Configuración por cinta: velocidad base inicial y multiplicador
  var configs = [
    { wrapId: 'strip-wrap-1', stripId: 'strip-1', baseSpeed:  0.165, mult: 0.72, pos: 0 },
    { wrapId: 'strip-wrap-2', stripId: 'strip-2', baseSpeed: -0.120, mult: 0.66, pos: 0 },
    { wrapId: 'strip-wrap-3', stripId: 'strip-3', baseSpeed:  0.195, mult: 0.78, pos: 0 },
  ];

  configs.forEach(function(cfg) {
    var wrap  = document.getElementById(cfg.wrapId);
    var strip = document.getElementById(cfg.stripId);
    if (!wrap || !strip) return;

    var mouseX   = -1;
    var speed    = cfg.baseSpeed;
    var absBase  = Math.abs(cfg.baseSpeed);
    var sign     = cfg.baseSpeed >= 0 ? 1 : -1;

    // Canvas overlay para efecto BN/color degradado
    var canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;';
    wrap.appendChild(canvas);
    var ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = wrap.offsetWidth;
      canvas.height = wrap.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Dibuja el overlay BN/color en función del mouseX
    function drawOverlay(relX) {
      var w = canvas.width;
      var h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      if (relX < 0) {
        // Sin mouse: toda la cinta levemente desaturada
        ctx.fillStyle = 'rgba(17,17,16,0.35)';
        ctx.fillRect(0, 0, w, h);
        return;
      }

      // Zona central: color puro. Zona lateral: BN
      // El tercio central (mouseX ± ~1/6 del ancho) queda en color
      var third = w / 3;
      var cx = relX; // centro del efecto (sigue al mouse)

      // Clampeamos el centro para que siempre haya zona BN en ambos lados
      cx = Math.max(third * 0.5, Math.min(w - third * 0.5, cx));

      var fadeW = third * 0.6; // ancho de la zona de transición

      // Izquierda: BN
      var gradL = ctx.createLinearGradient(0, 0, cx, 0);
      gradL.addColorStop(0,   'rgba(17,17,16,0.82)');
      gradL.addColorStop(Math.max(0, 1 - (fadeW / cx)), 'rgba(17,17,16,0.82)');
      gradL.addColorStop(1,   'rgba(17,17,16,0)');
      ctx.fillStyle = gradL;
      ctx.fillRect(0, 0, cx, h);

      // Derecha: BN
      var gradR = ctx.createLinearGradient(cx, 0, w, 0);
      gradR.addColorStop(0,   'rgba(17,17,16,0)');
      gradR.addColorStop(Math.min(1, fadeW / (w - cx)), 'rgba(17,17,16,0.82)');
      gradR.addColorStop(1,   'rgba(17,17,16,0.82)');
      ctx.fillStyle = gradR;
      ctx.fillRect(cx, 0, w - cx, h);
    }

    // Duplicar imágenes para loop
    function ensureLoop() {
      var imgs = strip.querySelectorAll('img');
      var visible = Array.from(imgs).filter(function(i){ return i.style.display !== 'none'; });
      if (visible.length === 0) return;
      // Solo duplicar si no se ha duplicado aún
      if (!strip.dataset.looped) {
        visible.forEach(function(img) {
          var clone = img.cloneNode(true);
          strip.appendChild(clone);
        });
        strip.dataset.looped = '1';
      }
    }

    // Esperar a que carguen imágenes para duplicar
    var loaded = 0;
    var imgs = strip.querySelectorAll('img');
    if (imgs.length === 0) { ensureLoop(); }
    else {
      imgs.forEach(function(img) {
        if (img.complete) { loaded++; if (loaded >= imgs.length) ensureLoop(); }
        else {
          img.addEventListener('load',  function(){ loaded++; if (loaded >= imgs.length) ensureLoop(); });
          img.addEventListener('error', function(){ loaded++; if (loaded >= imgs.length) ensureLoop(); });
        }
      });
    }

    // Mouse
    wrap.addEventListener('mouseenter', function(e) { mouseX = e.clientX; });
    wrap.addEventListener('mousemove',  function(e) { mouseX = e.clientX; });
    wrap.addEventListener('mouseleave', function()  { mouseX = -1; });

    // Touch
    wrap.addEventListener('touchmove', function(e) {
      mouseX = e.touches[0].clientX;
    }, {passive: true});
    wrap.addEventListener('touchend', function() { mouseX = -1; }, {passive: true});

    // RAF loop
    (function tick() {
      var halfW = strip.scrollWidth / 2;

      if (mouseX < 0) {
        // Sin mouse: velocidad base (dirección original)
        speed = cfg.baseSpeed;
        drawOverlay(-1);
      } else {
        var rect  = wrap.getBoundingClientRect();
        var relX  = mouseX - rect.left;
        var center = rect.width / 2;
        var dist  = relX - center;
        var norm  = dist / center; // -1 … +1
        // Velocidad: al centro se acerca a 0, en los bordes al máximo
        speed = norm * absBase * cfg.mult;
        drawOverlay(relX);
      }

      cfg.pos -= speed;

      if (halfW > 0) {
        if (cfg.pos <= -halfW) cfg.pos += halfW;
        if (cfg.pos > 0)       cfg.pos -= halfW;
      }

      strip.style.transform = 'translateX(' + cfg.pos + 'px)';
      requestAnimationFrame(tick);
    })();

  });

})();
</script>

</body>
</html>
