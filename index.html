<style>
@font-face {
  font-family: 'Conthrax';
  src: url('assets/fonts/CONTHRAX-SEMIBOLD.OTF') format('opentype');
  font-weight: 600; font-style: normal; font-display: swap;
}
@font-face {

  src: url('assets/fonts/SQUARE721_BT_BOLD.TTF') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_ROMAN.TTF') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}

:root {
  --bg:      #111110;
  --surface: #1a1a18;
  --orange:  #ff6600;
  --blue:    #8cd7f7;
  --muted:   #888880;
  --border:  #2a2a28;
  --text:    #e8e6e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Square721BT', sans-serif;
  overflow: hidden;
}

/* ═══════════════════════════════
   PAGE — 4 bandas
═══════════════════════════════ */
.page {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ─── BANDA 1: HEADER (7/32) ─── */
.header {
  flex: 0 0 calc(100vh * 7/32);
  display: flex;
  align-items: stretch;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 0;
}

/* Zona logo */
.header-logo {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  border-right: 1px solid var(--border);
}
.header-logo img {
  height: calc(100vh * 7/32 * 0.72);
  width: auto;
  object-fit: contain;
  display: block;
}

/* Zona identidad + nav */
.header-identity {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 2rem 1.1rem 1.8rem;
  gap: 0.2rem;
}

.h-name {
  font-family: 'Conthrax', sans-serif;
  font-size: clamp(0.85rem, 1.6vw, 1.25rem);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

.h-role {
  font-family: 'Square721BT', sans-serif;
  font-size: clamp(0.6rem, 0.9vw, 0.75rem);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Nav links en la misma línea */
.header-nav {
  position: absolute;
  right: 2rem;
  bottom: 1.1rem;
  display: flex;
  align-items: center;
  gap: 2rem;
}

.nav-link {
  font-family: 'Square721BT', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #0E6BA8;
  text-decoration: none;
  transition: color 0.2s, opacity 0.2s;
  white-space: nowrap;
}
.nav-link:hover { opacity: 0.75; }
.nav-link.active { opacity: 1; }

/* Selector de idioma */
.lang-switch {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-left: 0.6rem;
  padding-left: 1.2rem;
  border-left: 1px solid var(--border2, #333330);
}
.lang-btn {
  font-family: 'Square721BT', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { color: var(--orange); }
.lang-sep { color: var(--border2, #333330); font-size: 0.6rem; }

/* Línea naranja en la parte inferior del header */
.header::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--orange) 20%, var(--orange) 80%, transparent);
  opacity: 0.4;
}

/* ─── BANDAS 2, 3, 4: CINTAS (1/4 cada una) ─── */
.filmstrip-wrap {
  flex: 0 0 calc(100vh * 1/4);
  overflow: hidden;
  position: relative;
  border-top: 1px solid var(--border);
  background: #0a0a09;
  cursor: crosshair;
}

.filmstrip-layer {
  display: flex;
  height: 100%;
  width: max-content;
  will-change: transform;
  position: absolute;
  top: 0; left: 0;
}

.filmstrip-layer img {
  height: 100%;
  width: auto;
  object-fit: cover;
  flex-shrink: 0;
  margin-right: 3px;
  display: block;
}

/* Capa color: se revela solo en el centro via mask, definida inline por JS */
.layer-color {
  z-index: 2;
}
.layer-bw {
  z-index: 1;
  filter: grayscale(1) contrast(1.05);
}

/* ─── FAJA FOOTER (1/32) ─── */
.footer-bar {
  flex: 0 0 calc(100vh * 1/32);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.footer-bar span {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

.footer-social {
  display: flex;
  align-items: center;
  gap: 12px; /* igual al tamaño del ícono (12px) */
  height: 100%;
}
.footer-social a {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-social a:hover { color: var(--orange); }
.footer-social svg { width: 12px; height: 12px; }

/* ─── ANIMACIÓN ENTRADA ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.header { animation: fadeUp 0.7s 0.1s both; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .header-nav { display: none; }
  .h-name { font-size: 0.8rem; }
  .header-identity { padding: 0 1rem 0.8rem 1rem; }
}
@media (max-width: 480px) {
  html, body { overflow: hidden; }
  .page { height: 100dvh; }
  .header { flex: 0 0 calc(100dvh * 7/32); }
  .filmstrip-wrap { flex: 0 0 calc(100dvh * 1/4); }
  .footer-bar { flex: 0 0 calc(100dvh * 1/32); }
  .header-logo img { height: calc(100dvh * 7/32 * 0.65); }
  .h-name { font-size: 0.72rem; }
}
</style>

<script>
/* ══════════════════════════════════════════════════
   FILMSTRIP ENGINE
   Cada cinta es independiente en velocidad y dirección
   Efecto: centro=color, laterales=BN, transición degradada
══════════════════════════════════════════════════ */

(function() {

  // Configuración por cinta: velocidad base (px/frame sin mouse) y dirección
  var configs = [
    { wrapId: 'strip-wrap-1', stripId: 'strip-1', baseSpeed:  0.165, pos: 0 },
    { wrapId: 'strip-wrap-2', stripId: 'strip-2', baseSpeed: -0.120, pos: 0 },
    { wrapId: 'strip-wrap-3', stripId: 'strip-3', baseSpeed:  0.195, pos: 0 },
  ];

  // En los extremos del mouse, la velocidad llega a este múltiplo de la base
  var MAX_MULT = 2;

  configs.forEach(function(cfg) {
    var wrap      = document.getElementById(cfg.wrapId);
    var colorLayer = document.getElementById(cfg.stripId);
    if (!wrap || !colorLayer) return;

    var mouseX  = -1;
    var speed   = cfg.baseSpeed;
    var absBase = Math.abs(cfg.baseSpeed);

    // ── Crear capa B/N duplicando la capa de color ──
    var bwLayer = colorLayer.cloneNode(true);
    bwLayer.id = '';
    bwLayer.className = 'filmstrip-layer layer-bw';
    wrap.insertBefore(bwLayer, colorLayer);

    // La capa de color se revela solo donde la máscara es opaca (blanco = visible)
    colorLayer.style.webkitMaskRepeat = 'no-repeat';
    colorLayer.style.maskRepeat = 'no-repeat';
    colorLayer.style.webkitMaskSize = '100% 100%';
    colorLayer.style.maskSize = '100% 100%';

    function applyMask(relX) {
      var w = wrap.offsetWidth;
      if (relX < 0) {
        // Sin mouse: todo en B/N (oculta capa color por completo)
        colorLayer.style.webkitMaskImage = 'linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0))';
        colorLayer.style.maskImage = 'linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0))';
        return;
      }
      var third  = w / 3;
      var cx     = Math.max(third * 0.5, Math.min(w - third * 0.5, relX));
      var fadeW  = third * 0.6;
      var p0 = Math.max(0, cx - fadeW);
      var p1 = cx;
      var p2 = cx;
      var p3 = Math.min(w, cx + fadeW);
      var pct = function(px) { return (px / w * 100).toFixed(2) + '%'; };

      var grad = 'linear-gradient(to right,' +
        ' rgba(0,0,0,0) 0%,' +
        ' rgba(0,0,0,0) ' + pct(p0) + ',' +
        ' rgba(0,0,0,1) ' + pct(p1) + ',' +
        ' rgba(0,0,0,1) ' + pct(p2) + ',' +
        ' rgba(0,0,0,0) ' + pct(p3) + ',' +
        ' rgba(0,0,0,0) 100%)';

      colorLayer.style.webkitMaskImage = grad;
      colorLayer.style.maskImage = grad;
    }

    // Estado inicial: todo B/N (sin mouse)
    applyMask(-1);

    // ── Loop de imágenes: duplicar contenido para scroll infinito ──
    function ensureLoop(layer) {
      var imgs = layer.querySelectorAll('img');
      var visible = Array.from(imgs).filter(function(i){ return i.style.display !== 'none'; });
      if (visible.length === 0 || layer.dataset.looped) return;
      visible.forEach(function(img) {
        layer.appendChild(img.cloneNode(true));
      });
      layer.dataset.looped = '1';
    }

    [colorLayer, bwLayer].forEach(function(layer) {
      var imgs = layer.querySelectorAll('img');
      var loaded = 0;
      if (imgs.length === 0) { ensureLoop(layer); return; }
      imgs.forEach(function(img) {
        if (img.complete) { loaded++; if (loaded >= imgs.length) ensureLoop(layer); }
        else {
          img.addEventListener('load',  function(){ loaded++; if (loaded >= imgs.length) ensureLoop(layer); });
          img.addEventListener('error', function(){ loaded++; if (loaded >= imgs.length) ensureLoop(layer); });
        }
      });
    });

    // ── Mouse / touch ──
    wrap.addEventListener('mouseenter', function(e) { mouseX = e.clientX; });
    wrap.addEventListener('mousemove',  function(e) { mouseX = e.clientX; });
    wrap.addEventListener('mouseleave', function()  { mouseX = -1; });
    wrap.addEventListener('touchmove', function(e) { mouseX = e.touches[0].clientX; }, {passive: true});
    wrap.addEventListener('touchend',  function()   { mouseX = -1; }, {passive: true});

    // ── RAF loop ──
    (function tick() {
      var halfW = colorLayer.scrollWidth / 2;

      if (mouseX < 0) {
        speed = cfg.baseSpeed;
        applyMask(-1);
      } else {
        var rect   = wrap.getBoundingClientRect();
        var relX   = mouseX - rect.left;
        var center = rect.width / 2;
        var norm   = Math.max(-1, Math.min(1, (relX - center) / center)); // -1…+1, 0 en el centro

        // Curva suave: 0 en el centro, hasta MAX_MULT en los extremos.
        // Se usa norm^2 con signo para una aceleración gradual (no lineal abrupta).
        var curved = Math.sign(norm) * Math.pow(Math.abs(norm), 1.6);
        speed = curved * absBase * MAX_MULT * Math.sign(cfg.baseSpeed || 1);

        applyMask(relX);
      }

      cfg.pos -= speed;
      if (halfW > 0) {
        if (cfg.pos <= -halfW) cfg.pos += halfW;
        if (cfg.pos > 0)       cfg.pos -= halfW;
      }

      colorLayer.style.transform = 'translateX(' + cfg.pos + 'px)';
      bwLayer.style.transform    = 'translateX(' + cfg.pos + 'px)';
      requestAnimationFrame(tick);
    })();

  });

})();
</script>

</body>
