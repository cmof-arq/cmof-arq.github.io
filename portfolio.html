<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Portfolio — César Ortiz Ferrer | CMOF Architecture Office">
<title>Portfolio | CMOF Architecture Office</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">

<style>
@font-face {
  font-family: 'Conthrax';
  src: url('assets/fonts/CONTHRAX-SEMIBOLD.OTF') format('opentype');
  font-weight: 600; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_BOLD.TTF') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_ROMAN.TTF') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}

:root {
  --bg:      #111110;
  --surface: #1a1a18;
  --surface2:#222220;
  --orange:  #ff6600;
  --blue:    #8cd7f7;
  --green:   #4ac87a;
  --yellow:  #c8b84a;
  --muted:   #888880;
  --border:  #2a2a28;
  --border2: #333330;
  --text:    #e8e6e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Square721BT', sans-serif;
  overflow: hidden;
}

/* ══ LAYOUT PRINCIPAL ══ */
.page {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─ TOPBAR ─ */
.topbar {
  flex-shrink: 0;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 1.5rem;
  position: relative;
  z-index: 10;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  text-decoration: none;
}
.topbar-logo img {
  height: 28px;
  width: auto;
}
.topbar-name {
  font-family: 'Conthrax', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
}

.topbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border2);
}

.topbar-section {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
}

.topbar-nav {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.topbar-nav a {
  font-family: 'Square721BT', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #0E6BA8;
  text-decoration: none;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.topbar-nav a:hover { opacity: 0.75; }
.topbar-nav a.active { opacity: 1; color: var(--orange); }

/* Selector de idioma (idéntico en todas las páginas) */
.lang-switch {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-left: 0.6rem;
  padding-left: 1.2rem;
  border-left: 1px solid var(--border2);
}
.lang-btn {
  font-family: 'Square721BT', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { color: var(--orange); }
.lang-sep { color: var(--border2); font-size: 0.6rem; }

/* ─ CONTENIDO PRINCIPAL ─ */
.content {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* Botón hamburguesa — tamaño similar al logo, siempre visible */
/* Botón flecha toggle del sidebar */
.sidebar-toggle {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 3px;
  cursor: pointer;
  position: absolute;
  top: 0.5rem;
  left: 0.5rem;
  z-index: 5;
  transition: left 0.35s cubic-bezier(.4,0,.2,1), background 0.2s;
}
.sidebar-toggle:hover { background: var(--surface2); border-color: var(--orange); }
.sidebar-toggle svg {
  width: 16px;
  height: 16px;
  color: var(--muted);
  transition: color 0.2s;
  flex-shrink: 0;
}
.sidebar-toggle:hover svg { color: var(--orange); }

/* Cuando el sidebar está expandido, el botón se posiciona pegado a su borde derecho */
.content.expanded .sidebar-toggle {
  left: calc(100% / 7 - 28px - 0.5rem);
}
@media (min-width: 1540px) {
  .content.expanded .sidebar-toggle { left: calc(220px - 28px - 0.5rem); }
}

/* ─ SIDEBAR: lista proyectos (1/7) ─ */
.sidebar {
  width: calc(100% / 7);
  min-width: 160px;
  max-width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.35s cubic-bezier(.4,0,.2,1), min-width 0.35s cubic-bezier(.4,0,.2,1), opacity 0.25s ease;
}

.content.collapsed .sidebar {
  width: 0;
  min-width: 0;
  border-right: none;
  opacity: 0;
  pointer-events: none;
}

.sidebar-head {
  padding: 0.7rem 0.8rem 0.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-head h2 {
  font-size: 1.02rem; /* 0.6 × 1.7 = 1.02rem */
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.7rem;
  line-height: 1;
}

/* Botón FILTROS desplegable */
.filtros-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0.4rem 0.5rem;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--muted);
  font-family: 'Square721BT', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  margin-bottom: 0;
}
.filtros-toggle:hover { border-color: var(--orange); color: var(--orange); }
.filtros-toggle.open { border-color: var(--orange); color: var(--orange); }
.filtros-toggle-arrow {
  width: 10px;
  height: 10px;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.filtros-toggle.open .filtros-toggle-arrow { transform: rotate(180deg); }

.filtros-panel {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s cubic-bezier(.4,0,.2,1);
}
.filtros-panel.open { max-height: 500px; }

.filtros-section {
  padding: 0.6rem 0 0;
}
.filtros-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  margin-bottom: 0.35rem;
  user-select: none;
}
.filtros-section-label {
  font-size: 0.56rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}
.filtros-section-arrow {
  width: 8px;
  height: 8px;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.filtros-section-header.open .filtros-section-arrow { transform: rotate(180deg); }
.filtros-section-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease;
}
.filtros-section-body.open { max-height: 300px; }

.sort-btn {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.sort-btn svg { width: 11px; height: 11px; }
.sort-btn:hover { border-color: #0E6BA8; color: #8cd7f7; }
.sort-btn.active { border-color: #0E6BA8; color: #8cd7f7; background: rgba(14,107,168,0.12); }

.filters { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.filters-year { margin-top: 0; }
.filter-btn {
  font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--orange); color: var(--orange); }
.filter-btn.year-btn:hover, .filter-btn.year-btn.active { border-color: #0E6BA8; color: #8cd7f7; }
.filter-label { font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }

/* Lista de proyectos — scroll limitado a altura de pantalla */
.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.4rem 0;
  max-height: calc(100vh - 160px);
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.project-list::-webkit-scrollbar { width: 4px; }
.project-list::-webkit-scrollbar-track { background: transparent; }
.project-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.project-list::-webkit-scrollbar-thumb:hover { background: var(--orange); }

.proj-item {
  padding: 0.65rem 1rem;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.proj-item:hover {
  background: var(--surface2);
}
.proj-item.active {
  background: var(--surface2);
  border-left-color: var(--orange);
}
.proj-item.dimmed .pi-cod,
.proj-item.dimmed .pi-nom,
.proj-item.dimmed .pi-yr {
  color: var(--muted) !important;
  opacity: 0.45;
}
.pi-cod {
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--orange);
  transition: color 0.2s, opacity 0.2s;
}
.pi-nom {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--text);
  line-height: 1.3;
  transition: color 0.2s, opacity 0.2s;
}
.pi-yr {
  font-size: 0.6rem;
  color: var(--muted);
  transition: color 0.2s, opacity 0.2s;
}

/* ─ DETALLE DE PROYECTO (6/7) ─ */
.detail {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  position: relative;
}

.detail::-webkit-scrollbar { width: 5px; }
.detail::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Estado vacío */
.detail-empty {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  color: var(--muted);
}
.detail-empty .de-logo {
  font-family: 'Conthrax', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.2em;
  color: var(--border2);
  text-transform: uppercase;
}
.detail-empty p {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Contenido del detalle */
.detail-inner {
  display: none;
  padding: 2.5rem 3rem;
}
.detail-inner.visible { display: block; }

/* Header del proyecto */
.det-head {
  margin-bottom: 2rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid var(--border);
}

.det-cod {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.5rem;
}

.det-nombre {
  font-family: 'Conthrax', sans-serif;
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 0.6rem;
}

.det-meta {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  flex-wrap: wrap;
  margin-bottom: 0.6rem;
}
.det-meta-loc {
  margin-bottom: 0;
  padding-top: 0.6rem;
  border-top: 1px solid var(--border);
}
.det-meta-item {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.det-meta-item span {
  color: var(--text);
  margin-left: 0.3rem;
}

.det-map-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  color: #8cd7f7;
  text-decoration: none;
  border: 1px solid #0E6BA8;
  border-radius: 50%;
  transition: background 0.15s, transform 0.15s;
  margin-left: -0.4rem;
}
.det-map-link:hover {
  background: #0E6BA8;
  color: #fff;
  transform: scale(1.08);
}
.det-map-link svg { width: 12px; height: 12px; }
.det-map-link.hidden { display: none; }

.det-estado {
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.08em;
}
.est-activo    { background: #122a1a; color: var(--green); }
.est-pausa     { background: #2a2a12; color: var(--yellow); }
.est-terminado { background: #12202a; color: var(--blue); }
.est-archivo   { background: #1e1e1c; color: var(--muted); }
.est-proyecto  { background: #1e1a2a; color: #b08cf7; }

/* Carrusel de imágenes */
/* Cuerpo: galería 4/5 + memoria 1/5 */
.det-body {
  display: flex;
  gap: 2rem;
  align-items: flex-start;
}

.det-gallery {
  flex: 0 0 80%;
  max-width: 80%;
  margin-bottom: 0;
}

.carousel {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  max-height: calc(100vh - 280px);
  background: var(--surface);
  overflow: hidden;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-track {
  position: relative;
  width: 100%;
  height: 100%;
}

.carousel-slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: var(--surface);
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.carousel-slide.active {
  opacity: 1;
  pointer-events: auto;
}

.carousel-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(17,17,16,0.55);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  color: #e8e6e0;
  cursor: pointer;
  z-index: 3;
  transition: background 0.2s, border-color 0.2s;
  backdrop-filter: blur(2px);
}
.carousel-arrow:hover { background: rgba(255,102,0,0.75); border-color: var(--orange); }
.carousel-arrow.left  { left: 12px; }
.carousel-arrow.right { right: 12px; }
.carousel-arrow svg { width: 16px; height: 16px; }
.carousel-arrow.hidden { display: none; }

.carousel-dots {
  position: absolute;
  bottom: 12px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  z-index: 3;
}
.carousel-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}
.carousel-dot:hover { background: rgba(255,255,255,0.7); }
.carousel-dot.active { background: #fff; transform: scale(1.3); }

/* Texto / memoria */
.det-memoria {
  flex: 0 0 20%;
  max-width: 20%;
  max-height: calc(100vh - 280px);
  overflow-y: auto;
  font-size: 0.78rem;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
  padding-top: 0.2rem;
  padding-right: 0.6rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.det-memoria::-webkit-scrollbar { width: 4px; }
.det-memoria::-webkit-scrollbar-track { background: transparent; }
.det-memoria::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.det-memoria::-webkit-scrollbar-thumb:hover { background: #0E6BA8; }

/* ── ANIMACIÓN ENTRADA DETALLE ── */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}
.detail-inner.visible {
  animation: slideIn 0.25s ease both;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  .content { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-width: none;
    height: 200px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .project-list { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 0.4rem; }
  .proj-item { flex-shrink: 0; min-width: 120px; border-left: none; border-bottom: 2px solid transparent; }
  .proj-item.active { border-left: none; border-bottom-color: var(--orange); }
  .detail-inner { padding: 1.5rem; }
  .topbar-nav { display: none; }
  .sidebar-toggle { display: none; }
  .content.collapsed .sidebar { width: 100%; min-width: 0; opacity: 1; pointer-events: auto; }
  .det-body { flex-direction: column; }
  .det-gallery, .det-memoria { flex: 1 1 100%; max-width: 100%; }
}
</style>
</head>
<body>
<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <a class="topbar-logo" href="index.html">
      <img src="LOGO-CMOF - Q-2023 - ORIGINAL.png" alt="CMOF">
      <span class="topbar-name">CMOF</span>
    </a>
    <div class="topbar-sep"></div>
    <span class="topbar-section">Portfolio</span>
    <nav class="topbar-nav">
      <a href="index.html">Home</a>
      <a href="portfolio.html" class="active">Portfolio</a>
      <a href="web-estudio.html">Estudio</a>
      <a href="web-publicaciones.html">Publicaciones</a>
      <a href="web-contacto.html">Contacto</a>
      <div class="lang-switch" id="lang-switch">
        <button class="lang-btn active" data-lang="es">ESP</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en">ENG</button>
      </div>
    </nav>
  </div>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- SIDEBAR TOGGLE (visible siempre, debajo del logo) -->
    <!-- SIDEBAR TOGGLE: flecha que cambia dirección -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Mostrar/ocultar proyectos">
      <svg id="toggleArrow" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <polygon points="8,4 16,12 8,20"/>
      </svg>
    </button>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h2>Proyectos</h2>

        <!-- Botón FILTROS desplegable -->
        <button class="filtros-toggle" id="filtrosToggle">
          <span>Filtros</span>
          <svg class="filtros-toggle-arrow" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="4,8 20,8 12,18"/>
          </svg>
        </button>

        <div class="filtros-panel" id="filtrosPanel">

          <!-- Sección TIPO -->
          <div class="filtros-section">
            <div class="filtros-section-header" id="tipoHeader">
              <span class="filtros-section-label">Tipo</span>
              <svg class="filtros-section-arrow" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <polygon points="4,8 20,8 12,18"/>
              </svg>
            </div>
            <div class="filtros-section-body" id="tipoBody">
              <div class="filters" id="filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
              </div>
            </div>
          </div>

          <!-- Sección AÑO -->
          <div class="filtros-section">
            <div class="filtros-section-header" id="anioHeader">
              <span class="filtros-section-label">Año</span>
              <svg class="filtros-section-arrow" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <polygon points="4,8 20,8 12,18"/>
              </svg>
              <button class="sort-btn" id="sortYearBtn" title="Ordenar por año" style="margin-left:auto">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h6M3 12h4M3 17h2M16 4v16M16 4l-3 3M16 4l3 3"/></svg>
                Ordenar
              </button>
            </div>
            <div class="filtros-section-body" id="anioBody">
              <div class="filters filters-year" id="filtersYear"></div>
            </div>
          </div>

        </div><!-- /filtrosPanel -->
      </div>

      <div class="project-list" id="project-list"></div>
    </div>

    <!-- DETALLE -->
    <div class="detail" id="detail">

      <div class="detail-empty" id="detail-empty">
        <div class="de-logo">CMOF</div>
        <p>Seleccioná un proyecto</p>
      </div>

      <div class="detail-inner" id="detail-inner">
        <div class="det-head">
          <div class="det-cod" id="d-cod"></div>
          <div class="det-nombre" id="d-nombre"></div>

          <!-- Renglón 1: datos del proyecto -->
          <div class="det-meta">
            <div class="det-meta-item">Tipología <span id="d-tipo"></span></div>
            <div class="det-meta-item">Inicio <span id="d-anio-ini"></span></div>
            <div class="det-meta-item">Finalizado <span id="d-anio-fin"></span></div>
            <div class="det-meta-item" id="d-sup-wrap">Superficie <span id="d-sup"></span></div>
            <div class="det-estado" id="d-estado"></div>
          </div>

          <!-- Renglón 2: ubicación -->
          <div class="det-meta det-meta-loc">
            <div class="det-meta-item">Ubicación <span id="d-ciudad"></span></div>
            <div class="det-meta-item" id="d-coords-wrap">Coordenadas <span id="d-coords"></span></div>
            <div class="det-meta-item" id="d-alt-wrap">Altitud <span id="d-alt"></span></div>
            <a class="det-map-link" id="d-map-link" href="#" target="_blank" title="Ver ubicación en el mapa">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </a>
          </div>
        </div>

        <!-- Cuerpo: galería (4/5) + memoria (1/5) -->
        <div class="det-body">

          <!-- Galería: carrusel -->
          <div class="det-gallery" id="d-gallery">
            <div class="carousel" id="d-carousel">
              <div class="carousel-track" id="d-track"></div>
              <button class="carousel-arrow left" id="d-arrow-left" title="Anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
              </button>
              <button class="carousel-arrow right" id="d-arrow-right" title="Siguiente">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
              </button>
              <div class="carousel-dots" id="d-dots"></div>
            </div>
          </div>

          <!-- Memoria -->
          <div class="det-memoria" id="d-memoria"></div>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   PORTFOLIO — carga desde proyectos.js o proyectos.json
   Si no existe el archivo, muestra datos de demo
════════════════════════════════════════════ */

var proyectos = [];
var activeFilter = 'all';
var activeYear   = 'all';
var sortByYear   = false; // false = orden original, true = por año descendente
var activeId     = null;

/* ── Tipologías (base + extras definidos en Studio Manager) ── */
var tipoLabel = { H:'Hospitality', K:'Residencial', I:'Industrial', O:'Oficinas', C:'Comercial', M:'Medios', V:'Otros' };
(function() {
  try {
    var cfg = JSON.parse(localStorage.getItem('cmof_cfg_v2')) || {};
    if (cfg.tiposExtra && cfg.tiposExtra.length) {
      cfg.tiposExtra.forEach(function(t) {
        tipoLabel[t] = (cfg.tiposLabels && cfg.tiposLabels[t]) ? cfg.tiposLabels[t] : t;
      });
    }
  } catch(e) {}
})();
var estadoClass = { 'Proyecto':'est-proyecto', 'Activo':'est-activo', 'En obra':'est-activo', 'En pausa':'est-pausa', 'Construido':'est-terminado', 'Terminado':'est-terminado', 'Archivo':'est-archivo' };

/* ── Cargar proyectos desde proyectos.js (exportado por admin) ── */
function loadProyectos() {
  // Intenta cargar el script proyectos.js; si no existe, usa demo
  var s = document.createElement('script');
  s.src = 'proyectos.js';
  s.onload = function() {
    if (typeof proyectosData !== 'undefined') {
      proyectos = proyectosData;
    }
    buildFilters();
    renderSidebar();
  };
  s.onerror = function() {
    // Sin archivo: usar datos de demo
    proyectos = demoProyectos();
    buildFilters();
    renderSidebar();
  };
  document.head.appendChild(s);
}

/* ── Construir filtros dinámicamente a partir de los proyectos cargados ── */
function buildFilters() {
  // Tipologías presentes (orden: según aparecen en tipoLabel para mantener un orden estable)
  var tiposPresentes = [];
  Object.keys(tipoLabel).forEach(function(t) {
    if (proyectos.some(function(p){ return p.codigo && p.codigo.charAt(0) === t; })) {
      tiposPresentes.push(t);
    }
  });

  var filtersEl = document.getElementById('filters');
  var html = '<button class="filter-btn active" data-filter="all">Todos</button>';
  tiposPresentes.forEach(function(t) {
    html += '<button class="filter-btn" data-filter="' + t + '">' + xe(tipoLabel[t]) + '</button>';
  });
  filtersEl.innerHTML = html;

  // Años presentes (usamos año de inicio; si no hay, año de fin)
  var anios = [];
  proyectos.forEach(function(p) {
    var a = p.anio_inicio || p.anio_fin;
    if (a && anios.indexOf(a) === -1) anios.push(a);
  });
  anios.sort(function(a,b){ return b.localeCompare(a); }); // más reciente primero

  var yearEl = document.getElementById('filtersYear');
  var yHtml = '<button class="filter-btn year-btn active" data-year="all">Todos los años</button>';
  anios.forEach(function(a) {
    yHtml += '<button class="filter-btn year-btn" data-year="' + xe(a) + '">' + xe(a) + '</button>';
  });
  yearEl.innerHTML = yHtml;

  // Bind eventos (se vuelven a generar los botones, así que re-bindeamos)
  filtersEl.addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    filtersEl.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    renderSidebar();
  });
  yearEl.addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    yearEl.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    activeYear = e.target.dataset.year;
    renderSidebar();
  });

  // Botón de orden por año (se bindea una sola vez)
  var sortBtn = document.getElementById('sortYearBtn');
  if (sortBtn && !sortBtn.dataset.bound) {
    sortBtn.dataset.bound = '1';
    sortBtn.addEventListener('click', function() {
      sortByYear = !sortByYear;
      sortBtn.classList.toggle('active', sortByYear);
      renderSidebar();
    });
  }
}

/* ── Demo (mientras no haya proyectos.js cargado) ── */
function demoProyectos() {
  return [
    {
      id: '1', codigo: 'H-BODEN-2019', nombre: 'Böden Hotel & SPA',
      tipologia: 'H', estado: 'Construido',
      anio_inicio: '2019', anio_fin: '2022',
      ciudad: 'Villa General Belgrano', provincia: 'Córdoba',
      memoria_es: 'El Böden Hotel & SPA nace de la voluntad de crear una experiencia de hospedaje que trasciende la comodidad convencional. El proyecto explora la relación entre la arquitectura, el paisaje serrano y la experiencia del huésped como una secuencia de descubrimientos.\n\nLa materialidad apela a lo tectónico local —piedra, madera, hormigón visto— componiéndose en un lenguaje contemporáneo que dialoga con la topografía del lugar.',
      imagenes: ['img-01.jpg','img-02.jpg','img-03.jpg','img-04.jpg']
    },
    {
      id: '2', codigo: 'K-EGLC-2020', nombre: 'Casa G&E.307',
      tipologia: 'K', estado: 'Construido',
      anio_inicio: '2020', anio_fin: '2023',
      ciudad: 'Córdoba', provincia: 'Córdoba',
      memoria_es: 'Vivienda unifamiliar en barrio privado. El proyecto articula los espacios de vida y descanso en torno a un patio central que organiza la circulación y la luz natural.',
      imagenes: ['img-01.jpg','img-02.jpg']
    },
    {
      id: '3', codigo: 'H-JMCP-2023', nombre: 'Hotel Carlos Paz',
      tipologia: 'H', estado: 'Activo',
      anio_inicio: '2023', anio_fin: '',
      ciudad: 'Villa Carlos Paz', provincia: 'Córdoba',
      memoria_es: '',
      imagenes: ['img-01.jpg']
    },
  ];
}

/* ── Render sidebar ── */
function matchesFilters(p) {
  var matchTipo = activeFilter === 'all' || (p.codigo && p.codigo.charAt(0) === activeFilter);
  var anio = p.anio_inicio || p.anio_fin;
  var matchYear = activeYear === 'all' || anio === activeYear;
  return matchTipo && matchYear;
}

function renderSidebar() {
  var list = document.getElementById('project-list');

  // Lista a renderizar: si hay orden por año activo, ordenamos una copia
  var lista = proyectos.slice();
  if (sortByYear) {
    lista.sort(function(a, b) {
      var ya = parseInt(a.anio_inicio || a.anio_fin || '0', 10);
      var yb = parseInt(b.anio_inicio || b.anio_fin || '0', 10);
      return yb - ya; // descendente
    });
  }

  list.innerHTML = '';
  lista.forEach(function(p) {
    var isFiltered = matchesFilters(p);
    var item = document.createElement('div');
    item.className = 'proj-item' + (p.id === activeId ? ' active' : '') + (!isFiltered ? ' dimmed' : '');
    item.dataset.id = p.id;
    item.innerHTML =
      '<div class="pi-cod">' + xe(p.codigo) + '</div>' +
      '<div class="pi-nom">' + xe(p.nombre) + '</div>' +
      '<div class="pi-yr">' + xe(p.anio_inicio || '') + (p.anio_fin ? ' – ' + p.anio_fin : '') + '</div>';
    item.addEventListener('click', function() { openProject(p.id); });
    list.appendChild(item);
  });
}

/* ── Abrir proyecto ── */
function openProject(id) {
  activeId = id;
  var p = proyectos.find(function(x){ return x.id === id; });
  if (!p) return;

  // Sidebar: activar ítem
  document.querySelectorAll('.proj-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Ocultar empty, mostrar detalle
  document.getElementById('detail-empty').style.display = 'none';
  var inner = document.getElementById('detail-inner');
  inner.classList.remove('visible');
  void inner.offsetWidth; // reflow para reiniciar animación
  inner.classList.add('visible');

  // Datos textuales
  document.getElementById('d-cod').textContent    = p.codigo || '';
  document.getElementById('d-nombre').textContent = p.nombre || '';
  document.getElementById('d-anio-ini').textContent = p.anio_inicio || '—';
  document.getElementById('d-anio-fin').textContent = p.anio_fin || '—';
  document.getElementById('d-tipo').textContent   = tipoLabel[p.tipologia] || p.tipologia || '—';
  document.getElementById('d-ciudad').textContent = [p.ciudad, p.provincia, p.pais].filter(Boolean).join(', ') || '—';
  document.getElementById('d-memoria').textContent = p.web_es || p.memoria_es || '';

  // Superficie (ocultar el renglón completo si no hay dato)
  var supWrap = document.getElementById('d-sup-wrap');
  if (p.superficie) {
    document.getElementById('d-sup').textContent = p.superficie + ' m²';
    supWrap.style.display = '';
  } else {
    supWrap.style.display = 'none';
  }

  // Coordenadas + altitud + link a mapa
  var lat = dmsToDecimal(p.lat, p.lat_hem);
  var lon = dmsToDecimal(p.lon, p.lon_hem);
  var coordsWrap = document.getElementById('d-coords-wrap');
  var altWrap    = document.getElementById('d-alt-wrap');
  var mapLink    = document.getElementById('d-map-link');

  if (lat !== null && lon !== null) {
    document.getElementById('d-coords').textContent =
      Math.abs(lat).toFixed(5) + '° ' + (p.lat_hem||'') + ', ' + Math.abs(lon).toFixed(5) + '° ' + (p.lon_hem||'');
    coordsWrap.style.display = '';
    mapLink.href = 'https://www.google.com/maps?q=' + lat + ',' + lon;
    mapLink.classList.remove('hidden');
  } else {
    coordsWrap.style.display = 'none';
    mapLink.classList.add('hidden');
  }

  if (p.altitud) {
    document.getElementById('d-alt').textContent = p.altitud + ' m';
    altWrap.style.display = '';
  } else {
    altWrap.style.display = 'none';
  }

  // Estado badge
  var est = document.getElementById('d-estado');
  est.textContent  = p.estado || '';
  est.className    = 'det-estado ' + (estadoClass[p.estado] || 'est-archivo');

  // Galería: carrusel
  var imgs = (p.imagenes || []).slice();
  var basePath = 'projects/' + p.codigo + '/';
  var gallery  = document.getElementById('d-gallery');
  var track    = document.getElementById('d-track');
  var dotsEl   = document.getElementById('d-dots');
  var arrowL   = document.getElementById('d-arrow-left');
  var arrowR   = document.getElementById('d-arrow-right');

  // Limpiar timer de un carrusel anterior, si existía
  if (window._carouselTimer) { clearInterval(window._carouselTimer); window._carouselTimer = null; }

  if (imgs.length > 0) {
    gallery.style.display = '';
    track.innerHTML = '';
    dotsEl.innerHTML = '';

    var slides = [];
    var current = 0;

    imgs.forEach(function(imgName, i) {
      var img = document.createElement('img');
      img.className = 'carousel-slide' + (i === 0 ? ' active' : '');
      img.src = basePath + imgName;
      img.alt = '';
      // Si una imagen falla, la sacamos de la rotación sin romper el carrusel
      img.onerror = function() {
        img.style.display = 'none';
      };
      track.appendChild(img);
      slides.push(img);

      var dot = document.createElement('div');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', function() { goTo(i); restartAutoplay(); });
      dotsEl.appendChild(dot);
    });

    var dots = dotsEl.querySelectorAll('.carousel-dot');

    function goTo(i) {
      current = (i + imgs.length) % imgs.length;
      slides.forEach(function(s, idx){ s.classList.toggle('active', idx === current); });
      dots.forEach(function(d, idx){ d.classList.toggle('active', idx === current); });
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function restartAutoplay() {
      if (window._carouselTimer) clearInterval(window._carouselTimer);
      if (imgs.length > 1) {
        window._carouselTimer = setInterval(next, 4000);
      }
    }

    function pauseAutoplay() {
      if (window._carouselTimer) { clearInterval(window._carouselTimer); window._carouselTimer = null; }
    }

    // Mostrar flechas solo si hay más de una imagen
    var multi = imgs.length > 1;
    arrowL.classList.toggle('hidden', !multi);
    arrowR.classList.toggle('hidden', !multi);
    dotsEl.style.display = multi ? '' : 'none';

    // Click en la imagen: pausa. Flechas: reanuda.
    document.getElementById('d-track').addEventListener('click', function(e) {
      if (e.target.classList.contains('carousel-slide')) pauseAutoplay();
    });
    arrowL.onclick = function() { prev(); restartAutoplay(); };
    arrowR.onclick = function() { next(); restartAutoplay(); };

    restartAutoplay();
  } else {
    gallery.style.display = 'none';
  }

  // Scroll al tope del detalle
  document.getElementById('detail').scrollTop = 0;
}

/* ── Helpers ── */
function xe(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Convierte "grados minutos segundos" (string) + hemisferio a decimal con signo
function dmsToDecimal(dms, hem) {
  if (!dms) return null;
  var parts = dms.trim().split(/\s+/).map(Number);
  if (parts.length < 1 || isNaN(parts[0])) return null;
  var g = parts[0] || 0, m = parts[1] || 0, s = parts[2] || 0;
  var dec = g + (m / 60) + (s / 3600);
  if (hem === 'S' || hem === 'W') dec = -dec;
  return dec;
}

/* ── Sidebar colapsable con flecha direccional ── */
(function() {
  var content = document.querySelector('.content');
  var toggle  = document.getElementById('sidebarToggle');
  var arrow   = document.getElementById('toggleArrow');
  if (!content || !toggle) return;

  content.classList.add('expanded');

  function updateArrow() {
    var collapsed = content.classList.contains('collapsed');
    // ► cuando está colapsado (apunta derecha = expandir), ◄ cuando está expandido (apunta izquierda = colapsar)
    arrow.innerHTML = collapsed
      ? '<polygon points="8,4 16,12 8,20"/>'   // apunta derecha → expandir
      : '<polygon points="16,4 8,12 16,20"/>'; // apunta izquierda → colapsar
  }

  updateArrow();

  toggle.addEventListener('click', function() {
    var collapsed = content.classList.toggle('collapsed');
    content.classList.toggle('expanded', !collapsed);
    updateArrow();
  });
})();

/* ── Filtros: botón FILTROS desplegable + secciones TIPO y AÑO ── */
(function() {
  // Panel principal FILTROS
  var filtrosBtn   = document.getElementById('filtrosToggle');
  var filtrosPanel = document.getElementById('filtrosPanel');
  if (filtrosBtn && filtrosPanel) {
    filtrosBtn.addEventListener('click', function() {
      var open = filtrosPanel.classList.toggle('open');
      filtrosBtn.classList.toggle('open', open);
    });
  }

  // Sub-sección TIPO
  var tipoHeader = document.getElementById('tipoHeader');
  var tipoBody   = document.getElementById('tipoBody');
  if (tipoHeader && tipoBody) {
    tipoHeader.addEventListener('click', function(e) {
      // Evitar que el click en el botón "Ordenar" dentro abra/cierre la sección
      if (e.target.closest('#sortYearBtn')) return;
      var open = tipoBody.classList.toggle('open');
      tipoHeader.classList.toggle('open', open);
    });
    tipoBody.classList.add('open');
    tipoHeader.classList.add('open');
  }

  // Sub-sección AÑO
  var anioHeader = document.getElementById('anioHeader');
  var anioBody   = document.getElementById('anioBody');
  if (anioHeader && anioBody) {
    anioHeader.addEventListener('click', function(e) {
      if (e.target.closest('#sortYearBtn')) return;
      var open = anioBody.classList.toggle('open');
      anioHeader.classList.toggle('open', open);
    });
    anioBody.classList.add('open');
    anioHeader.classList.add('open');
  }
})();

/* ── Selector de idioma (placeholder visual; integración completa de textos pendiente) ── */
(function() {
  var sw = document.getElementById('lang-switch');
  if (!sw) return;
  sw.addEventListener('click', function(e) {
    if (!e.target.classList.contains('lang-btn')) return;
    sw.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    document.documentElement.setAttribute('data-lang', e.target.dataset.lang);
  });
})();

/* ── Init ── */
loadProyectos();
</script>
</body>
</html>
