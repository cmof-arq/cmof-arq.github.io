<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Portfolio — César Ortiz Ferrer | CMOF Architecture Office">
<title>Portfolio | CMOF Architecture Office</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">

<style>
@font-face {
  font-family: 'Conthrax';
  src: url('assets/fonts/CONTHRAX-SEMIBOLD.OTF') format('opentype');
  font-weight: 600; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_BOLD.TTF') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Square721BT';
  src: url('assets/fonts/SQUARE721_BT_ROMAN.TTF') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}

:root {
  --bg:      #111110;
  --surface: #1a1a18;
  --surface2:#222220;
  --orange:  #ff6600;
  --blue:    #8cd7f7;
  --green:   #4ac87a;
  --yellow:  #c8b84a;
  --muted:   #888880;
  --border:  #2a2a28;
  --border2: #333330;
  --text:    #e8e6e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Square721BT', sans-serif;
  overflow: hidden;
}

/* ══ LAYOUT PRINCIPAL ══ */
.page {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─ TOPBAR ─ */
.topbar {
  flex-shrink: 0;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 1.5rem;
  position: relative;
  z-index: 10;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  text-decoration: none;
}
.topbar-logo img {
  height: 28px;
  width: auto;
}
.topbar-name {
  font-family: 'Conthrax', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
}

.topbar-sep {
  width: 1px;
  height: 20px;
  background: var(--border2);
}

.topbar-section {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
}

.topbar-nav {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.topbar-nav a {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.topbar-nav a:hover { color: var(--orange); }
.topbar-nav a.active { color: var(--orange); }

/* ─ CONTENIDO PRINCIPAL ─ */
.content {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* Botón hamburguesa — tamaño similar al logo, siempre visible */
.sidebar-toggle {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  margin: 0.6rem 0 0 0.6rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 3px;
  cursor: pointer;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 5;
  transition: left 0.35s cubic-bezier(.4,0,.2,1), background 0.2s;
}
.sidebar-toggle:hover { background: var(--surface2); }
.sidebar-toggle span {
  display: block;
  width: 16px;
  height: 1.5px;
  background: var(--muted);
  transition: background 0.2s;
}
.sidebar-toggle:hover span { background: var(--orange); }

/* Cuando el sidebar está expandido, el botón se posiciona pegado a su borde derecho */
.content.expanded .sidebar-toggle {
  left: calc(100% / 7 - 36px - 0.6rem);
}
@media (min-width: 1540px) {
  .content.expanded .sidebar-toggle { left: calc(220px - 36px - 0.6rem); }
}

/* ─ SIDEBAR: lista proyectos (1/7) ─ */
.sidebar {
  width: calc(100% / 7);
  min-width: 160px;
  max-width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.35s cubic-bezier(.4,0,.2,1), min-width 0.35s cubic-bezier(.4,0,.2,1), opacity 0.25s ease;
}

.content.collapsed .sidebar {
  width: 0;
  min-width: 0;
  border-right: none;
  opacity: 0;
  pointer-events: none;
}

.sidebar-head {
  padding: 0.9rem 1rem 0.7rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-head h2 {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.5rem;
}

/* Filtros rápidos */
.filter-label {
  font-size: 0.56rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.35rem;
}
.filter-label-year {
  margin-top: 0.6rem;
  padding-top: 0.6rem;
  border-top: 1px solid var(--border);
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
}
.filters-year {
  margin-top: 0;
}
.filter-btn {
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--orange);
  color: var(--orange);
}
.filter-btn.year-btn:hover, .filter-btn.year-btn.active {
  border-color: #0E6BA8;
  color: #8cd7f7;
}

/* Lista de proyectos */
.project-list {
  flex: 1;
  overflow-y: auto;
  padding: 0.4rem 0;
}

.project-list::-webkit-scrollbar { width: 4px; }
.project-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.proj-item {
  padding: 0.65rem 1rem;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.proj-item:hover {
  background: var(--surface2);
}
.proj-item.active {
  background: var(--surface2);
  border-left-color: var(--orange);
}
.proj-item.dimmed .pi-cod,
.proj-item.dimmed .pi-nom,
.proj-item.dimmed .pi-yr {
  color: var(--muted) !important;
  opacity: 0.45;
}
.pi-cod {
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--orange);
  transition: color 0.2s, opacity 0.2s;
}
.pi-nom {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--text);
  line-height: 1.3;
  transition: color 0.2s, opacity 0.2s;
}
.pi-yr {
  font-size: 0.6rem;
  color: var(--muted);
  transition: color 0.2s, opacity 0.2s;
}

/* ─ DETALLE DE PROYECTO (6/7) ─ */
.detail {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  position: relative;
}

.detail::-webkit-scrollbar { width: 5px; }
.detail::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Estado vacío */
.detail-empty {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  color: var(--muted);
}
.detail-empty .de-logo {
  font-family: 'Conthrax', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.2em;
  color: var(--border2);
  text-transform: uppercase;
}
.detail-empty p {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Contenido del detalle */
.detail-inner {
  display: none;
  padding: 2.5rem 3rem;
}
.detail-inner.visible { display: block; }

/* Header del proyecto */
.det-head {
  margin-bottom: 2rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid var(--border);
}

.det-cod {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.5rem;
}

.det-nombre {
  font-family: 'Conthrax', sans-serif;
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 0.6rem;
}

.det-meta {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  flex-wrap: wrap;
  margin-bottom: 0.6rem;
}
.det-meta-loc {
  margin-bottom: 0;
  padding-top: 0.6rem;
  border-top: 1px solid var(--border);
}
.det-meta-item {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.det-meta-item span {
  color: var(--text);
  margin-left: 0.3rem;
}

.det-map-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  color: #8cd7f7;
  text-decoration: none;
  border: 1px solid #0E6BA8;
  border-radius: 50%;
  transition: background 0.15s, transform 0.15s;
  margin-left: -0.4rem;
}
.det-map-link:hover {
  background: #0E6BA8;
  color: #fff;
  transform: scale(1.08);
}
.det-map-link svg { width: 12px; height: 12px; }
.det-map-link.hidden { display: none; }

.det-estado {
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.08em;
}
.est-activo    { background: #122a1a; color: var(--green); }
.est-pausa     { background: #2a2a12; color: var(--yellow); }
.est-terminado { background: #12202a; color: var(--blue); }
.est-archivo   { background: #1e1e1c; color: var(--muted); }
.est-proyecto  { background: #1e1a2a; color: #b08cf7; }

/* Galería de imágenes */
/* Cuerpo: galería 4/5 + memoria 1/5 */
.det-body {
  display: flex;
  gap: 2rem;
  align-items: flex-start;
}

.det-gallery {
  flex: 0 0 80%;
  max-width: 80%;
  margin-bottom: 0;
}

.gallery-thumbs-row {
  position: relative;
  display: flex;
  align-items: center;
  margin-bottom: 0.6rem;
}

.gallery-thumbs {
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  scroll-behavior: smooth;
  flex: 1;
  scrollbar-width: none;
  padding: 2px 0;
}
.gallery-thumbs::-webkit-scrollbar { display: none; }

.gallery-thumb {
  width: 86px;
  height: 58px;
  object-fit: cover;
  cursor: pointer;
  opacity: 0.5;
  border: 1px solid transparent;
  transition: opacity 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.gallery-thumb:hover { opacity: 0.8; }
.gallery-thumb.active { opacity: 1; border-color: var(--orange); }

.gallery-arrow {
  flex-shrink: 0;
  width: 26px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--muted);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, opacity 0.15s;
  z-index: 2;
}
.gallery-arrow:hover { color: var(--orange); border-color: var(--orange); }
.gallery-arrow.left  { margin-right: 0.4rem; }
.gallery-arrow.right { margin-left: 0.4rem; }
.gallery-arrow svg { width: 14px; height: 14px; }
.gallery-arrow.disabled { opacity: 0.25; pointer-events: none; }

.gallery-main {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: var(--surface);
  display: block;
  cursor: zoom-in;
}

/* Texto / memoria */
.det-memoria {
  flex: 0 0 20%;
  max-width: 20%;
  font-size: 0.78rem;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
  padding-top: 0.2rem;
}

/* ── ANIMACIÓN ENTRADA DETALLE ── */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}
.detail-inner.visible {
  animation: slideIn 0.25s ease both;
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  .content { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-width: none;
    height: 200px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .project-list { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 0.4rem; }
  .proj-item { flex-shrink: 0; min-width: 120px; border-left: none; border-bottom: 2px solid transparent; }
  .proj-item.active { border-left: none; border-bottom-color: var(--orange); }
  .detail-inner { padding: 1.5rem; }
  .topbar-nav { display: none; }
  .sidebar-toggle { display: none; }
  .content.collapsed .sidebar { width: 100%; min-width: 0; opacity: 1; pointer-events: auto; }
  .det-body { flex-direction: column; }
  .det-gallery, .det-memoria { flex: 1 1 100%; max-width: 100%; }
}
</style>
</head>

<div class="page">

  <!-- TOPBAR -->

<script>
/* ════════════════════════════════════════════
   PORTFOLIO — carga desde proyectos.js o proyectos.json
   Si no existe el archivo, muestra datos de demo
════════════════════════════════════════════ */

var proyectos = [];
var activeFilter = 'all';
var activeYear   = 'all';
var activeId     = null;

/* ── Tipologías (base + extras definidos en Studio Manager) ── */
var tipoLabel = { H:'Hospitality', K:'Residencial', I:'Industrial', O:'Oficinas', C:'Comercial', M:'Medios', V:'Otros' };
(function() {
  try {
    var cfg = JSON.parse(localStorage.getItem('cmof_cfg_v2')) || {};
    if (cfg.tiposExtra && cfg.tiposExtra.length) {
      cfg.tiposExtra.forEach(function(t) {
        tipoLabel[t] = (cfg.tiposLabels && cfg.tiposLabels[t]) ? cfg.tiposLabels[t] : t;
      });
    }
  } catch(e) {}
})();
var estadoClass = { 'Proyecto':'est-proyecto', 'Activo':'est-activo', 'En obra':'est-activo', 'En pausa':'est-pausa', 'Construido':'est-terminado', 'Terminado':'est-terminado', 'Archivo':'est-archivo' };

/* ── Cargar proyectos desde proyectos.js (exportado por admin) ── */
function loadProyectos() {
  // Intenta cargar el script proyectos.js; si no existe, usa demo
  var s = document.createElement('script');
  s.src = 'proyectos.js';
  s.onload = function() {
    if (typeof proyectosData !== 'undefined') {
      proyectos = proyectosData;
    }
    buildFilters();
    renderSidebar();
  };
  s.onerror = function() {
    // Sin archivo: usar datos de demo
    proyectos = demoProyectos();
    buildFilters();
    renderSidebar();
  };
  document.head.appendChild(s);
}

/* ── Construir filtros dinámicamente a partir de los proyectos cargados ── */
function buildFilters() {
  // Tipologías presentes (orden: según aparecen en tipoLabel para mantener un orden estable)
  var tiposPresentes = [];
  Object.keys(tipoLabel).forEach(function(t) {
    if (proyectos.some(function(p){ return p.codigo && p.codigo.charAt(0) === t; })) {
      tiposPresentes.push(t);
    }
  });

  var filtersEl = document.getElementById('filters');
  var html = '<button class="filter-btn active" data-filter="all">Todos</button>';
  tiposPresentes.forEach(function(t) {
    html += '<button class="filter-btn" data-filter="' + t + '">' + xe(tipoLabel[t]) + '</button>';
  });
  filtersEl.innerHTML = html;

  // Años presentes (usamos año de inicio; si no hay, año de fin)
  var anios = [];
  proyectos.forEach(function(p) {
    var a = p.anio_inicio || p.anio_fin;
    if (a && anios.indexOf(a) === -1) anios.push(a);
  });
  anios.sort(function(a,b){ return b.localeCompare(a); }); // más reciente primero

  var yearEl = document.getElementById('filtersYear');
  var yHtml = '<button class="filter-btn year-btn active" data-year="all">Todos los años</button>';
  anios.forEach(function(a) {
    yHtml += '<button class="filter-btn year-btn" data-year="' + xe(a) + '">' + xe(a) + '</button>';
  });
  yearEl.innerHTML = yHtml;

  // Bind eventos (se vuelven a generar los botones, así que re-bindeamos)
  filtersEl.addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    filtersEl.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    renderSidebar();
  });
  yearEl.addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    yearEl.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    e.target.classList.add('active');
    activeYear = e.target.dataset.year;
    renderSidebar();
  });
}

/* ── Render sidebar ── */
function matchesFilters(p) {
  var matchTipo = activeFilter === 'all' || (p.codigo && p.codigo.charAt(0) === activeFilter);
  var anio = p.anio_inicio || p.anio_fin;
  var matchYear = activeYear === 'all' || anio === activeYear;
  return matchTipo && matchYear;
}

function renderSidebar() {
  var list = document.getElementById('project-list');

  list.innerHTML = '';
  proyectos.forEach(function(p) {
    var isFiltered = matchesFilters(p);
    var item = document.createElement('div');
    item.className = 'proj-item' + (p.id === activeId ? ' active' : '') + (!isFiltered ? ' dimmed' : '');
    item.dataset.id = p.id;
    item.innerHTML =
      '<div class="pi-cod">' + xe(p.codigo) + '</div>' +
      '<div class="pi-nom">' + xe(p.nombre) + '</div>' +
      '<div class="pi-yr">' + xe(p.anio_inicio || '') + (p.anio_fin ? ' – ' + p.anio_fin : '') + '</div>';
    item.addEventListener('click', function() { openProject(p.id); });
    list.appendChild(item);
  });
}

/* ── Abrir proyecto ── */
function openProject(id) {
  activeId = id;
  var p = proyectos.find(function(x){ return x.id === id; });
  if (!p) return;

  // Colapsar sidebar automáticamente para liberar espacio
  var content = document.querySelector('.content');
  if (content && !content.classList.contains('collapsed')) {
    content.classList.add('collapsed');
    content.classList.remove('expanded');
  }

  // Sidebar: activar ítem
  document.querySelectorAll('.proj-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Ocultar empty, mostrar detalle
  document.getElementById('detail-empty').style.display = 'none';
  var inner = document.getElementById('detail-inner');
  inner.classList.remove('visible');
  void inner.offsetWidth; // reflow para reiniciar animación
  inner.classList.add('visible');

  // Datos textuales
  document.getElementById('d-cod').textContent    = p.codigo || '';
  document.getElementById('d-nombre').textContent = p.nombre || '';
  document.getElementById('d-anio-ini').textContent = p.anio_inicio || '—';
  document.getElementById('d-anio-fin').textContent = p.anio_fin || '—';
  document.getElementById('d-tipo').textContent   = tipoLabel[p.tipologia] || p.tipologia || '—';
  document.getElementById('d-ciudad').textContent = [p.ciudad, p.provincia, p.pais].filter(Boolean).join(', ') || '—';
  document.getElementById('d-memoria').textContent = p.web_es || p.memoria_es || '';

  // Superficie (ocultar el renglón completo si no hay dato)
  var supWrap = document.getElementById('d-sup-wrap');
  if (p.superficie) {
    document.getElementById('d-sup').textContent = p.superficie + ' m²';
    supWrap.style.display = '';
  } else {
    supWrap.style.display = 'none';
  }

  // Coordenadas + altitud + link a mapa
  var lat = dmsToDecimal(p.lat, p.lat_hem);
  var lon = dmsToDecimal(p.lon, p.lon_hem);
  var coordsWrap = document.getElementById('d-coords-wrap');
  var altWrap    = document.getElementById('d-alt-wrap');
  var mapLink    = document.getElementById('d-map-link');

  if (lat !== null && lon !== null) {
    document.getElementById('d-coords').textContent =
      Math.abs(lat).toFixed(5) + '° ' + (p.lat_hem||'') + ', ' + Math.abs(lon).toFixed(5) + '° ' + (p.lon_hem||'');
    coordsWrap.style.display = '';
    mapLink.href = 'https://www.google.com/maps?q=' + lat + ',' + lon;
    mapLink.classList.remove('hidden');
  } else {
    coordsWrap.style.display = 'none';
    mapLink.classList.add('hidden');
  }

  if (p.altitud) {
    document.getElementById('d-alt').textContent = p.altitud + ' m';
    altWrap.style.display = '';
  } else {
    altWrap.style.display = 'none';
  }

  // Estado badge
  var est = document.getElementById('d-estado');
  est.textContent  = p.estado || '';
  est.className    = 'det-estado ' + (estadoClass[p.estado] || 'est-archivo');

  // Galería
  var imgs = p.imagenes || [];
  var basePath = 'projects/' + p.codigo + '/';
  var mainImg  = document.getElementById('d-img-main');
  var thumbsEl = document.getElementById('d-thumbs');
  var gallery  = document.getElementById('d-gallery');
  var arrowL   = document.getElementById('d-arrow-left');
  var arrowR   = document.getElementById('d-arrow-right');

  if (imgs.length > 0) {
    gallery.style.display = '';
    mainImg.src = basePath + imgs[0];
    mainImg.onerror = function() { this.style.display = 'none'; };

    thumbsEl.innerHTML = '';
    thumbsEl.scrollLeft = 0;
    imgs.forEach(function(imgName, i) {
      var th = document.createElement('img');
      th.className = 'gallery-thumb' + (i === 0 ? ' active' : '');
      th.src = basePath + imgName;
      th.onerror = function() { this.style.display = 'none'; };
      th.addEventListener('click', function() {
        mainImg.src = basePath + imgName;
        document.querySelectorAll('.gallery-thumb').forEach(function(t){ t.classList.remove('active'); });
        th.classList.add('active');
      });
      thumbsEl.appendChild(th);
    });

    updateArrows();
  } else {
    gallery.style.display = 'none';
  }

  function updateArrows() {
    var atStart = thumbsEl.scrollLeft <= 2;
    var atEnd   = thumbsEl.scrollLeft >= (thumbsEl.scrollWidth - thumbsEl.clientWidth - 2);
    arrowL.classList.toggle('disabled', atStart);
    arrowR.classList.toggle('disabled', atEnd || thumbsEl.scrollWidth <= thumbsEl.clientWidth);
  }
  thumbsEl.onscroll = updateArrows;
  arrowL.onclick = function() { thumbsEl.scrollLeft -= 180; };
  arrowR.onclick = function() { thumbsEl.scrollLeft += 180; };

  // Scroll al tope del detalle
  document.getElementById('detail').scrollTop = 0;
}

/* ── Helpers ── */
function xe(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Convierte "grados minutos segundos" (string) + hemisferio a decimal con signo
function dmsToDecimal(dms, hem) {
  if (!dms) return null;
  var parts = dms.trim().split(/\s+/).map(Number);
  if (parts.length < 1 || isNaN(parts[0])) return null;
  var g = parts[0] || 0, m = parts[1] || 0, s = parts[2] || 0;
  var dec = g + (m / 60) + (s / 3600);
  if (hem === 'S' || hem === 'W') dec = -dec;
  return dec;
}

(function() {
  var content = document.querySelector('.content');
  var toggle  = document.getElementById('sidebarToggle');
  if (!content || !toggle) return;
  content.classList.add('expanded'); // estado inicial: expandido
  toggle.addEventListener('click', function() {
    var collapsed = content.classList.toggle('collapsed');
    content.classList.toggle('expanded', !collapsed);
  });
})();
