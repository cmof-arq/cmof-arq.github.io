<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CMOF Admin — Publicaciones & Blog</title>
<style>
:root {
  --bg: #111110; --surface: #1a1a18; --surface2: #222220;
  --orange: #ff6600; --blue: #8cd7f7; --muted: #888880;
  --border: #2a2a28; --border2: #333330; --text: #e8e6e0;
  --green: #4ac87a; --red: #e05252;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
.page { display:flex; height:100vh; }

/* Sidebar */
.sidebar { width: 320px; flex-shrink:0; background: var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sb-head { padding: 1.2rem; border-bottom:1px solid var(--border); }
.sb-logo { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom: 1rem; }
.sb-logo span { color: var(--orange); }
.sb-logo .sub { display:block; font-size:9px; color: var(--blue); margin-top:2px; }

/* Tabs internos del sidebar */
.sb-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-tab { flex:1; text-align:center; padding:0.7rem; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color: var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
.sb-tab:hover { color: var(--text); }
.sb-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

.sb-tab-panel { display:none; flex:1; overflow-y:auto; flex-direction:column; }
.sb-tab-panel.active { display:flex; }

.btn-nuevo { margin: 0.8rem; padding:0.7rem; background: var(--orange); color:#fff; border:none; border-radius:3px; font-weight:600; font-size:13px; cursor:pointer; }
.btn-nuevo:hover { opacity:0.9; }

.item-list { flex:1; padding: 0 0 0.5rem; }
.item-row { padding: 0.65rem 1.2rem; cursor:pointer; border-left:2px solid transparent; }
.item-row:hover { background: var(--surface2); }
.item-row.active { background: var(--surface2); border-left-color: var(--orange); }
.ir-yr { font-size:10px; letter-spacing:0.1em; color: var(--orange); }
.ir-title { font-size:13px; font-weight:600; color: var(--text); margin-top:2px; }
.ir-sub { font-size:11px; color: var(--muted); margin-top:2px; }

.sb-foot { padding: 1rem; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:0.5rem; flex-shrink:0; }
.btn-sec { padding:0.55rem 0.8rem; background: var(--surface2); border:1px solid var(--border2); border-radius:3px; color: var(--text); font-size:12px; cursor:pointer; text-decoration:none; text-align:center; display:block; }
.btn-sec:hover { border-color: var(--orange); }

/* Main */
.main { flex:1; overflow-y:auto; padding: 2rem 3rem; }
.empty { display:flex; align-items:center; justify-content:center; height:100%; color: var(--muted); font-size:14px; }

.fsec { margin-bottom: 1.5rem; padding: 1.2rem; background: var(--surface); border:1px solid var(--border); border-radius:4px; }
.fsec h3 { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color: var(--orange); margin-bottom:1rem; }
.fld { margin-bottom: 0.9rem; }
.fld label { display:block; font-size:11px; color: var(--muted); margin-bottom:0.35rem; }
.fld input, .fld textarea, .fld select { width:100%; padding:0.6rem 0.7rem; background: var(--bg); border:1px solid var(--border2); border-radius:3px; color:var(--text); font-size:13px; font-family:inherit; }
.fld textarea { min-height: 90px; resize:vertical; }
.fld input:focus, .fld textarea:focus, .fld select:focus { outline:none; border-color: var(--orange); }
.fg2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.fg3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }

.page-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.page-head h1 { font-size: 22px; }
.head-actions { display:flex; gap:0.6rem; }
.btn-del { padding:0.5rem 0.9rem; background:transparent; border:1px solid var(--red); color:var(--red); border-radius:3px; font-size:12px; cursor:pointer; }
.btn-guardar { padding:0.5rem 1.2rem; background: var(--orange); color:#fff; border:none; border-radius:3px; font-weight:600; font-size:13px; cursor:pointer; }

.img-list { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:0.8rem; }
.img-row { display:flex; align-items:center; gap:0.6rem; padding:0.4rem 0.6rem; background:var(--bg); border:1px solid var(--border2); border-radius:3px; font-size:12px; }
.img-row .ir-num { color: var(--muted); width:20px; }
.img-row .ir-name { flex:1; }
.img-row .ir-x { cursor:pointer; color: var(--red); }

/* GitHub panel */
.gh-panel { margin-top:0.6rem; border:1px solid var(--border2); border-radius:3px; overflow:hidden; }
.gh-head { display:flex; align-items:center; justify-content:space-between; padding:0.55rem 0.7rem; background: var(--surface2); cursor:pointer; font-size:11px; color: var(--text); }
.gh-head:hover { background:#272725; }
.gh-chev { transition: transform 0.2s; color: var(--muted); }
.gh-chev.open { transform: rotate(180deg); }
.gh-body { padding:0.8rem; background: var(--bg); }
.gh-body .fld label { font-size:10px; text-transform:uppercase; letter-spacing:0.05em; }
.btn-publish { width:100%; background:#0E6BA8; color:#fff; border:none; font-weight:600; padding:0.6rem; border-radius:3px; cursor:pointer; }
.btn-publish:hover { opacity:0.88; }
.btn-publish:disabled { opacity:0.4; cursor:not-allowed; }
.gh-log { margin-top:0.6rem; max-height:140px; overflow-y:auto; font-size:10.5px; font-family:monospace; line-height:1.5; }
.gh-log div { padding:2px 0; border-bottom:1px solid var(--border); color: var(--muted); }
.gh-log div.ok { color: var(--green); }
.gh-log div.err { color: var(--red); }
.gh-log div.run { color: var(--blue); }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border2); padding:0.7rem 1.2rem; border-radius:4px; font-size:13px; opacity:0; transition:all 0.25s; pointer-events:none; z-index:50; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.tok { border-color: var(--green); color: var(--green); }
.toast.terr { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div class="page">

  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">CMOF <span>Admin</span><span class="sub">Publicaciones & Blog</span></div>
    </div>

    <div class="sb-tabs">
      <div class="sb-tab active" data-tab="pub">Publicaciones</div>
      <div class="sb-tab" data-tab="blog">Blog</div>
    </div>

    <div class="sb-tab-panel active" id="tab-pub">
      <button class="btn-nuevo" id="btnNuevaPub">+ Nueva publicación</button>
      <div class="item-list" id="pubList"></div>
    </div>
    <div class="sb-tab-panel" id="tab-blog">
      <button class="btn-nuevo" id="btnNuevoPost">+ Nuevo artículo</button>
      <div class="item-list" id="postList"></div>
    </div>

    <div class="sb-foot">
      <div id="sm-status" style="font-size:10px;text-align:center;color:var(--muted);"></div>
      <a class="btn-sec" href="https://github.com/cmof-arq/cmof-arq.github.io" target="_blank">⇗ Abrir GitHub</a>

      <div class="gh-panel" id="gh-panel">
        <div class="gh-head" id="ghToggle">
          <span>⇪ Publicar a GitHub</span>
          <span class="gh-chev" id="ghChev">▾</span>
        </div>
        <div class="gh-body" id="ghBody" style="display:none">
          <div class="fld">
            <label>Personal Access Token</label>
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
          </div>
          <div class="fg2" style="margin-bottom:0.6rem">
            <div class="fld"><label>Owner</label><input type="text" id="ghOwner" value="cmof-arq"></div>
            <div class="fld"><label>Repo</label><input type="text" id="ghRepo" value="cmof-arq.github.io"></div>
          </div>
          <label style="display:flex;align-items:center;gap:0.4rem;font-size:11px;color:var(--muted);margin-bottom:0.7rem;cursor:pointer;">
            <input type="checkbox" id="ghRemember"> Recordar token en este navegador
          </label>
          <div id="ghPendingInfo" style="font-size:11px;color:var(--muted);margin-bottom:0.6rem;"></div>
          <button class="btn-sec" id="btnClearPending" style="font-size:10px;padding:0.3rem 0.5rem;margin-bottom:0.6rem;">✕ Limpiar imágenes pendientes</button>
          <button class="btn-publish" id="btnPublish">⇪ Publicar contenido + fotos</button>
          <div id="ghLog" class="gh-log"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty">Seleccioná una publicación o artículo,<br>o creá uno nuevo.</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════
   CMOF ADMIN — PUBLICACIONES & BLOG
   Exporta: publicaciones-data.js
   var publicacionesData = { publicaciones:[...], posts:[...] }
══════════════════════════════════════════════════ */

var DB_KEY = 'cmof_publicaciones_v1';
var data = { publicaciones: [], posts: [] };
var activoTipo = null; // 'pub' | 'post'
var activoId = null;
window._pendingFiles = window._pendingFiles || {};

function uid(prefix) { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function xe(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function gv(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

function dbLoad() {
  try { data = JSON.parse(localStorage.getItem(DB_KEY)) || { publicaciones:[], posts:[] }; }
  catch(e) { data = { publicaciones:[], posts:[] }; }
}
function dbSave() { localStorage.setItem(DB_KEY, JSON.stringify(data)); }

function toast(type, msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='ok'?'tok':'terr') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

/* ── TABS SIDEBAR ── */
document.querySelectorAll('.sb-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.sb-tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.sb-tab-panel').forEach(function(p){ p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

/* ── RENDER LISTAS ── */
function renderPubList() {
  var list = document.getElementById('pubList');
  list.innerHTML = '';
  data.publicaciones.forEach(function(p) {
    var row = document.createElement('div');
    row.className = 'item-row' + (activoTipo==='pub' && p.id===activoId ? ' active' : '');
    row.innerHTML = '<div class="ir-yr">' + xe(p.anio||'') + '</div><div class="ir-title">' + xe(p.titulo || 'Sin título') + '</div><div class="ir-sub">' + xe(p.categoria||'') + '</div>';
    row.addEventListener('click', function(){ abrirPub(p.id); });
    list.appendChild(row);
  });
}
function renderPostList() {
  var list = document.getElementById('postList');
  list.innerHTML = '';
  data.posts.forEach(function(p) {
    var row = document.createElement('div');
    row.className = 'item-row' + (activoTipo==='post' && p.id===activoId ? ' active' : '');
    row.innerHTML = '<div class="ir-yr">' + xe(p.anio||'') + '</div><div class="ir-title">' + xe(p.titulo || 'Sin título') + '</div><div class="ir-sub">' + xe(p.fecha||'') + '</div>';
    row.addEventListener('click', function(){ abrirPost(p.id); });
    list.appendChild(row);
  });
}
function renderAll() { renderPubList(); renderPostList(); }

/* ── HELPERS de imágenes (reutilizable para pub y post) ── */
function renderImgList(imgs) {
  if (!imgs.length) return '<div style="font-size:11px;color:var(--muted)">Sin imágenes cargadas.</div>';
  return imgs.map(function(name, i) {
    return '<div class="img-row" data-idx="' + i + '"><span class="ir-num">' + (i+1) + '</span><span class="ir-name">' + xe(name) + '</span><span class="ir-x" data-del="' + i + '">✕</span></div>';
  }).join('');
}

function bindImgEvents(containerSelector, item, folderBase, rerenderFn) {
  var container = document.querySelector(containerSelector);
  container.querySelectorAll('[data-del]').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(el.dataset.del, 10);
      var removed = item.fotos.splice(idx, 1)[0];
      if (window._pendingFiles) delete window._pendingFiles[folderBase + '/' + item.id + '/' + removed];
      rerenderFn();
    });
  });
}

/* ── PUBLICACIONES: nuevo / abrir / guardar / eliminar ── */
function nuevaPub() {
  var p = { id: uid('pub'), anio: new Date().getFullYear().toString(), titulo:'', categoria:'', texto:'', fotos:[] };
  data.publicaciones.push(p);
  dbSave();
  renderAll();
  abrirPub(p.id);
}

function abrirPub(id) {
  activoTipo = 'pub'; activoId = id;
  renderAll();
  var p = data.publicaciones.find(function(x){ return x.id === id; });
  if (!p) return;

  document.getElementById('main').innerHTML =
    '<div class="page-head"><h1>' + (xe(p.titulo) || 'Nueva publicación') + '</h1>' +
      '<div class="head-actions"><button class="btn-del" id="btnDel">Eliminar</button><button class="btn-guardar" id="btnGuardar">Guardar</button></div>' +
    '</div>' +
    '<div class="fsec"><h3>Datos</h3>' +
      '<div class="fg3">' +
        '<div class="fld"><label>Año</label><input type="text" id="f_anio" value="' + xe(p.anio) + '"></div>' +
        '<div class="fld" style="grid-column:span 2"><label>Título</label><input type="text" id="f_titulo" value="' + xe(p.titulo) + '"></div>' +
      '</div>' +
      '<div class="fld"><label>Categoría</label><select id="f_cat">' +
        ['Publicación','Concurso','Premio','Mención','Conferencia','Otro'].map(function(c){ return '<option' + (c===p.categoria?' selected':'') + '>' + c + '</option>'; }).join('') +
      '</select></div>' +
      '<div class="fld"><label>Texto</label><textarea id="f_texto" style="min-height:180px">' + xe(p.texto) + '</textarea></div>' +
    '</div>' +
    '<div class="fsec"><h3>Imágenes (opcional)</h3>' +
      '<div class="img-list" id="imgList">' + renderImgList(p.fotos) + '</div>' +
      '<input type="file" id="f_imgs" accept="image/*" multiple>' +
    '</div>';

  bindImgEvents('#imgList', p, 'publicaciones', function(){ abrirPub(p.id); });

  document.getElementById('btnGuardar').addEventListener('click', function() {
    p.anio = gv('f_anio'); p.titulo = gv('f_titulo'); p.categoria = gv('f_cat'); p.texto = gv('f_texto');
    if (!p.titulo) { toast('err','El título es obligatorio.'); return; }
    dbSave(); renderAll(); toast('ok','Publicación guardada.');
  });
  document.getElementById('btnDel').addEventListener('click', function() {
    if (!confirm('¿Eliminar "' + (p.titulo||'esta publicación') + '"?')) return;
    data.publicaciones = data.publicaciones.filter(function(x){ return x.id !== p.id; });
    if (window._pendingFiles) Object.keys(window._pendingFiles).forEach(function(k){ if (k.indexOf('publicaciones/'+p.id+'/')===0) delete window._pendingFiles[k]; });
    dbSave(); activoId = null; renderAll();
    document.getElementById('main').innerHTML = '<div class="empty">Eliminado.</div>';
    toast('ok','Eliminado.'); refreshPublishStatus();
  });
  document.getElementById('f_imgs').addEventListener('change', function(e) {
    if (!p.id) return;
    Array.from(e.target.files).forEach(function(f) {
      if (p.fotos.indexOf(f.name) === -1) p.fotos.push(f.name);
      window._pendingFiles['publicaciones/' + p.id + '/' + f.name] = f;
    });
    dbSave();
    toast('ok', e.target.files.length + ' imagen(es) agregada(s). Se suben al publicar.');
    refreshPublishStatus();
    abrirPub(p.id);
  });
}

/* ── BLOG: nuevo / abrir / guardar / eliminar ── */
function nuevoPost() {
  var p = { id: uid('post'), anio: new Date().getFullYear().toString(), fecha:'', titulo:'', excerpt:'', texto:'', fotos:[] };
  data.posts.push(p);
  dbSave();
  renderAll();
  abrirPost(p.id);
}

function abrirPost(id) {
  activoTipo = 'post'; activoId = id;
  renderAll();
  var p = data.posts.find(function(x){ return x.id === id; });
  if (!p) return;

  document.getElementById('main').innerHTML =
    '<div class="page-head"><h1>' + (xe(p.titulo) || 'Nuevo artículo') + '</h1>' +
      '<div class="head-actions"><button class="btn-del" id="btnDel">Eliminar</button><button class="btn-guardar" id="btnGuardar">Guardar</button></div>' +
    '</div>' +
    '<div class="fsec"><h3>Datos</h3>' +
      '<div class="fg2">' +
        '<div class="fld"><label>Año</label><input type="text" id="f_anio" value="' + xe(p.anio) + '"></div>' +
        '<div class="fld"><label>Fecha (opcional)</label><input type="text" id="f_fecha" value="' + xe(p.fecha) + '" placeholder="12/03/2024"></div>' +
      '</div>' +
      '<div class="fld"><label>Título</label><input type="text" id="f_titulo" value="' + xe(p.titulo) + '"></div>' +
      '<div class="fld"><label>Resumen breve (se muestra en la lista)</label><textarea id="f_excerpt" style="min-height:60px">' + xe(p.excerpt) + '</textarea></div>' +
      '<div class="fld"><label>Texto completo del artículo</label><textarea id="f_texto" style="min-height:260px">' + xe(p.texto) + '</textarea></div>' +
    '</div>' +
    '<div class="fsec"><h3>Imágenes (opcional)</h3>' +
      '<div class="img-list" id="imgList">' + renderImgList(p.fotos) + '</div>' +
      '<input type="file" id="f_imgs" accept="image/*" multiple>' +
    '</div>';

  bindImgEvents('#imgList', p, 'blog', function(){ abrirPost(p.id); });

  document.getElementById('btnGuardar').addEventListener('click', function() {
    p.anio = gv('f_anio'); p.fecha = gv('f_fecha'); p.titulo = gv('f_titulo'); p.excerpt = gv('f_excerpt'); p.texto = gv('f_texto');
    if (!p.titulo) { toast('err','El título es obligatorio.'); return; }
    dbSave(); renderAll(); toast('ok','Artículo guardado.');
  });
  document.getElementById('btnDel').addEventListener('click', function() {
    if (!confirm('¿Eliminar "' + (p.titulo||'este artículo') + '"?')) return;
    data.posts = data.posts.filter(function(x){ return x.id !== p.id; });
    if (window._pendingFiles) Object.keys(window._pendingFiles).forEach(function(k){ if (k.indexOf('blog/'+p.id+'/')===0) delete window._pendingFiles[k]; });
    dbSave(); activoId = null; renderAll();
    document.getElementById('main').innerHTML = '<div class="empty">Eliminado.</div>';
    toast('ok','Eliminado.'); refreshPublishStatus();
  });
  document.getElementById('f_imgs').addEventListener('change', function(e) {
    if (!p.id) return;
    Array.from(e.target.files).forEach(function(f) {
      if (p.fotos.indexOf(f.name) === -1) p.fotos.push(f.name);
      window._pendingFiles['blog/' + p.id + '/' + f.name] = f;
    });
    dbSave();
    toast('ok', e.target.files.length + ' imagen(es) agregada(s). Se suben al publicar.');
    refreshPublishStatus();
    abrirPost(p.id);
  });
}

/* ── INIT ── */
function init() {
  dbLoad();
  renderAll();
  document.getElementById('btnNuevaPub').addEventListener('click', nuevaPub);
  document.getElementById('btnNuevoPost').addEventListener('click', nuevoPost);

  var smStatus = document.getElementById('sm-status');
  try {
    var cfg = JSON.parse(localStorage.getItem('cmof_cfg_v2'));
    smStatus.textContent = cfg ? 'Studio Manager conectado' : '';
    smStatus.style.color = cfg ? 'var(--green)' : 'var(--muted)';
  } catch(e) {}

  initGithubPanel();
}

/* ══════════════════════════════════════════════════
   PUBLICACIÓN A GITHUB
══════════════════════════════════════════════════ */
var GH_TOKEN_KEY = 'cmof_gh_token';

function initGithubPanel() {
  var head = document.getElementById('ghToggle');
  var body = document.getElementById('ghBody');
  var chev = document.getElementById('ghChev');

  head.addEventListener('click', function() {
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    chev.classList.toggle('open', !open);
    if (!open) refreshPublishStatus();
  });

  var saved = localStorage.getItem(GH_TOKEN_KEY);
  if (saved) {
    document.getElementById('ghToken').value = saved;
    document.getElementById('ghRemember').checked = true;
  }
  document.getElementById('ghRemember').addEventListener('change', function(e) {
    if (!e.target.checked) localStorage.removeItem(GH_TOKEN_KEY);
  });
  document.getElementById('btnPublish').addEventListener('click', publicarAGithub);
  document.getElementById('btnClearPending').addEventListener('click', function() {
    if (!confirm('¿Borrar todas las imágenes pendientes de subir (sin publicar)?')) return;
    window._pendingFiles = {};
    refreshPublishStatus();
    toast('ok','Imágenes pendientes limpiadas.');
  });
  refreshPublishStatus();
}

function refreshPublishStatus() {
  var info = document.getElementById('ghPendingInfo');
  var keys = Object.keys(window._pendingFiles || {});
  if (!keys.length) { info.textContent = 'Sin imágenes nuevas pendientes (se publicará el contenido de todas formas).'; return; }
  var porCarpeta = {};
  keys.forEach(function(k) {
    var partes = k.split('/');
    var grupo = partes[0] + '/' + partes[1];
    porCarpeta[grupo] = (porCarpeta[grupo]||0) + 1;
  });
  var detalle = Object.keys(porCarpeta).map(function(c){ return c + ' (' + porCarpeta[c] + ')'; }).join(', ');
  info.textContent = keys.length + ' imagen(es) pendiente(s) → ' + detalle;
}

function ghLog(msg, cls) {
  var log = document.getElementById('ghLog');
  var line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(r.result.split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function strToBase64Utf8(str) { return btoa(unescape(encodeURIComponent(str))); }

function ghPutFile(owner, repo, token, path, base64Content, message) {
  var encodedPath = path.split('/').map(encodeURIComponent).join('/');
  var url = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + encodedPath;
  return fetch(url, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' } })
    .then(function(res) { return res.ok ? res.json() : null; })
    .catch(function() { return null; })
    .then(function(existing) {
      var body = { message: message, content: base64Content };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    });
}

function publicarAGithub() {
  var token = gv('ghToken');
  var owner = gv('ghOwner') || 'cmof-arq';
  var repo  = gv('ghRepo')  || 'cmof-arq.github.io';
  if (!token) { toast('err','Pegá tu Personal Access Token primero.'); return; }
  if (!data.publicaciones.length && !data.posts.length) { toast('err','No hay contenido cargado para publicar.'); return; }

  if (document.getElementById('ghRemember').checked) localStorage.setItem(GH_TOKEN_KEY, token);

  var btn = document.getElementById('btnPublish');
  btn.disabled = true;
  document.getElementById('ghLog').innerHTML = '';
  ghLog('Iniciando publicación…', 'run');

  var pending = window._pendingFiles || {};
  var keysValidas = Object.keys(pending).filter(function(k){ return k.split('/')[0] !== ''; });
  var huerfanas = Object.keys(pending).filter(function(k){ return k.split('/')[0] === ''; });
  if (huerfanas.length) {
    ghLog('⚠ ' + huerfanas.length + ' imagen(es) descartadas por falta de referencia: ' + huerfanas.join(', '), 'err');
    huerfanas.forEach(function(k){ delete pending[k]; });
  }

  var jsStr = '// Generado por CMOF Admin Publicaciones & Blog — ' + new Date().toLocaleString() + '\nvar publicacionesData = ' + JSON.stringify(data, null, 2) + ';\n';
  var jsB64 = strToBase64Utf8(jsStr);

  ghPutFile(owner, repo, token, 'publicaciones-data.js', jsB64, 'Actualizar publicaciones-data.js desde CMOF Admin')
    .then(function(res) {
      if (!res.ok) return res.json().then(function(err){ throw new Error('publicaciones-data.js: ' + (err.message || res.status)); });
      ghLog('✓ publicaciones-data.js subido correctamente.', 'ok');
      return subirEnSecuencia(keysValidas, pending, owner, repo, token);
    })
    .then(function() {
      ghLog('Publicación completa. El sitio se actualizará en 1-2 minutos.', 'ok');
      toast('ok','Publicado correctamente en GitHub.');
      window._pendingFiles = {};
      refreshPublishStatus();
    })
    .catch(function(err) {
      ghLog('✗ Error: ' + err.message, 'err');
      toast('err','Error al publicar. Revisá el log.');
    })
    .finally(function(){ btn.disabled = false; });
}

function subirEnSecuencia(keys, pending, owner, repo, token) {
  if (!keys.length) return Promise.resolve();
  var i = 0;
  function next() {
    if (i >= keys.length) return Promise.resolve();
    var key = keys[i];
    var file = pending[key];
    ghLog('Subiendo ' + key + '…', 'run');
    return fileToBase64(file)
      .then(function(b64) { return ghPutFile(owner, repo, token, key, b64, 'Subir ' + key + ' desde CMOF Admin'); })
      .then(function(res) {
        if (!res.ok) return res.json().then(function(err){ throw new Error(key + ': ' + (err.message || res.status)); });
        ghLog('✓ ' + key, 'ok');
        i++;
        return next();
      });
  }
  return next();
}

init();
</script>
